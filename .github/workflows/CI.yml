name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags: '*'
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: all builds except for builds on the `main` branch
  # Cancel intermediate builds: only pull request builds
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  actions: write
  contents: read

jobs:
  finalize:
    needs: [format, test]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    if: always()

    steps:
      - run: |
          echo format: ${{ needs.format.result }}
          echo test: ${{ needs.test.result }}

      - run: exit 1
        if: |
          (needs.format.result != 'success') ||
          (needs.test.result != 'success')

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: just
      - name: Install runic
        run: |
          julia --project=@runic --startup-file=no -e 'using Pkg; Pkg.add("Runic")'
          cat > runic <<'SCRIPT'
          #!/bin/sh
          export JULIA_LOAD_PATH="@runic"
          exec julia --startup-file=no -e 'using Runic; exit(Runic.main(ARGS))' -- "$@"
          SCRIPT
          chmod +x runic
          echo "$PWD" >> "$GITHUB_PATH"
      - run: just fmt-check

  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          # Dendro uses the `public` keyword, so the floor is Julia 1.11. `min`
          # resolves the compat floor; `lts` (1.10) is below it.
          - 'min'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0

      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1.7.0

      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1.11.4
        continue-on-error: ${{ matrix.version == 'nightly' }}

      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1.2.2

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
